  port: 8080

jwt:
  secret: ${JWT_SECRET:sh-budget-jwt-secret-key-for-dev-must-be-at-least-32-bytes-long}
  access-token-expiration: 3600000      # 1시간
  refresh-token-expiration: 604800000   # 7일

